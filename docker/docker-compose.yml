version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: log-monitor-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: log_monitor
    volumes:
      - mongodb_data:/data/db
    networks:
      - log-monitor-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka + Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: log-monitor-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - log-monitor-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: log-monitor-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    networks:
      - log-monitor-network

  # Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: log-monitor-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/log_monitor
      JWT_SECRET: ${JWT_SECRET:-mongodb_log_monitor_secret_key}
      KAFKA_BROKER: kafka:29092
      FRONTEND_URL: http://localhost:3000
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - log-monitor-network
    restart: unless-stopped

  # AI Processing Service
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: log-monitor-ai-service
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: log_monitor
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_RAW_LOGS: raw-logs
      KAFKA_TOPIC_PROCESSED_LOGS: processed-logs
      KAFKA_TOPIC_ANOMALIES: anomalies
      BACKEND_API_URL: http://backend:5000
      LOG_FILE_PATH: /app/logs/mongodb.log
    volumes:
      - ../logs:/app/logs
    depends_on:
      - kafka
      - mongodb
    networks:
      - log-monitor-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: log-monitor-frontend
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_WS_URL: ws://localhost:5000
    depends_on:
      - backend
    networks:
      - log-monitor-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: log-monitor-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - log-monitor-network
    restart: unless-stopped

networks:
  log-monitor-network:
    driver: bridge

volumes:
  mongodb_data:

