apiVersion: v1
kind: Namespace
metadata:
  name: mongodb-log-monitor
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-log-monitor-config
  namespace: mongodb-log-monitor
data:
  mongodb-uri: "mongodb://mongodb-service:27017"
  kafka-broker: "kafka-service:29092"
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-log-monitor-secret
  namespace: mongodb-log-monitor
type: Opaque
stringData:
  jwt-secret: "mongodb_log_monitor_jwt_secret_key_change_in_production"
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: mongodb-log-monitor
spec:
  selector:
    app: mongodb
  ports:
  - name: mongodb
    port: 27017
    targetPort: 27017
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: mongodb-log-monitor
spec:
  selector:
    app: kafka
  ports:
  - name: kafka
    port: 29092
    targetPort: 29092
  type: ClusterIP

